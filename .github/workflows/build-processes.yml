name: Build and Test

on:
    push:
        branches: [main, master]
    pull_request:
        branches: ["**"]

jobs:
    lint-backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Install Ruff
              run: |
                  python -m pip install --upgrade pip
                  pip install ruff
            - name: Run Ruff
              run: ruff check

    lint-frontend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend/AuggieTaskManagerFrontend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: frontend/AuggieTaskManagerFrontend/package-lock.json
            - name: Install dependencies
              run: npm ci
            - name: Prettier
              run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

    test-backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend/auggietaskmanager
        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: auggie
                    POSTGRES_PASSWORD: auggie
                    POSTGRES_DB: auggietaskmanager
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            DJANGO_SETTINGS_MODULE: auggietaskmanager.settings
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
            - name: Migrate
              run: python manage.py migrate --noinput
            - name: Run tests
              run: python manage.py test tests --verbosity=2
