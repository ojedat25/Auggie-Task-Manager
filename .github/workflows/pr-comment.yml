name: PR status comment

on:
    workflow_run:
        workflows: ["Build and Test"]
        types: [completed]

permissions:
    issues: write
    pull-requests: read
    actions: read

jobs:
    upsert-comment:
        runs-on: ubuntu-latest
        steps:
            - name: Upsert PR comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const marker = "<!-- auggie-ci-status -->";
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      const run = context.payload.workflow_run;
                      const runUrl = run.html_url;
                      const conclusion = run.conclusion ?? "unknown";
                      const statusLabel =
                        conclusion === "success" ? "SUCCESS" :
                        conclusion === "failure" ? "FAILURE" :
                        conclusion === "cancelled" ? "CANCELLED" :
                        conclusion === "skipped" ? "SKIPPED" :
                        conclusion === "neutral" ? "NEUTRAL" :
                        conclusion === "timed_out" ? "TIMED_OUT" :
                        "UNKNOWN";

                      // workflow_run can relate to multiple PRs (rare). We'll comment on all.
                      const prs = run.pull_requests ?? [];
                      if (!Array.isArray(prs) || prs.length === 0) {
                        core.info("No pull requests associated with this workflow_run.");
                        return;
                      }

                      for (const pr of prs) {
                        const issue_number = pr.number;

                        const body = [
                          marker,
                          "### CI status",
                          "",
                          `**Build and Test**: ${statusLabel} \`${conclusion}\``,
                          `**Run**: ${runUrl}`,
                          "",
                          "Notes:",
                          "- Formatting fixes (Ruff/Prettier) may be auto-pushed to the PR branch.",
                          "- Inline annotations in “Files changed” show lint locations.",
                          "",
                          "_This comment is updated automatically._",
                        ].join("\\n");

                        const { data: comments } = await github.rest.issues.listComments({
                          owner,
                          repo,
                          issue_number,
                          per_page: 100,
                        });

                        const existing = comments.find(
                          (c) => typeof c.body === "string" && c.body.includes(marker),
                        );

                        if (existing) {
                          await github.rest.issues.updateComment({
                            owner,
                            repo,
                            comment_id: existing.id,
                            body,
                          });
                        } else {
                          await github.rest.issues.createComment({
                            owner,
                            repo,
                            issue_number,
                            body,
                          });
                        }
                      }
